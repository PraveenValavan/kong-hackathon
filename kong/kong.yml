_format_version: "3.0"
_transform: true

# ─── Services ───────────────────────────────────────────────────────────────
# Kong AI Gateway: services act as provider targets.
# ai-proxy handles auth injection and request/response normalisation natively —
# no request-transformer needed.

services:
  - name: openai-service
    url: https://api.openai.com
    tags: [aira, openai]

  - name: anthropic-service
    url: https://api.anthropic.com
    tags: [aira, anthropic]

  - name: openrouter-service
    url: https://openrouter.ai/api
    tags: [aira, openrouter]

# ─── Routes ─────────────────────────────────────────────────────────────────

routes:
  - name: openai-route
    service: openai-service
    paths:
      - /openai
    strip_path: true
    tags: [aira, openai]

  - name: anthropic-route
    service: anthropic-service
    paths:
      - /anthropic
    strip_path: true
    tags: [aira, anthropic]

  - name: openrouter-route
    service: openrouter-service
    paths:
      - /openrouter
    strip_path: true
    tags: [aira, openrouter]

# ─── Plugins ────────────────────────────────────────────────────────────────

plugins:
  # ── Auth ────────────────────────────────────────────────────────────────────
  # OIDC — validates Bearer token against mock IdP on every request.
  # Forwards JWT claims as upstream headers so the AIRA backend knows
  # which user/team/department made each call.
  - name: openid-connect
    config:
      issuer: http://mock-oauth2:8080/default/.well-known/openid-configuration
      client_id:
        - aira-local
      client_secret:
        - aira-secret
      auth_methods:
        - bearer
      bearer_token_param_type:
        - header
      verify_signature: true
      issuers_allowed:
        - http://localhost:8080/default
        - http://mock-oauth2:8080/default
      upstream_headers_claims:
        - sub:x-user-id
        - team_id:x-team-id
        - department:x-department

  # ── AI Proxy (replaces request-transformer) ─────────────────────────────────
  # Kong AI Gateway's ai-proxy plugin handles provider-specific auth injection,
  # request/response format normalisation, and automatic token usage extraction.
  # Token counts are available in Kong logs and upstream headers after each call.

  - name: ai-proxy
    route: openai-route
    config:
      route_type: llm/v1/chat
      auth:
        header_name: Authorization
        header_value: "{vault://env/OPENAI_API_KEY}"
      model:
        provider: openai
        name: gpt-4o
        options:
          max_tokens: 4096
          temperature: 0.7

  - name: ai-proxy
    route: anthropic-route
    config:
      route_type: llm/v1/chat
      auth:
        header_name: x-api-key
        header_value: "{vault://env/ANTHROPIC_API_KEY}"
      model:
        provider: anthropic
        name: claude-haiku-4-5-20251001
        options:
          max_tokens: 4096
          temperature: 0.7
          anthropic_version: "2023-06-01"

  # OpenRouter: no ai-proxy — model field passes through from the client request.
  # Kong only strips the incoming Bearer token and injects the real OpenRouter key.
  - name: request-transformer
    route: openrouter-route
    config:
      remove:
        headers:
          - Authorization
      add:
        headers:
          - "Authorization:Bearer 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"

  # ── Token-Based Rate Limiting (replaces rate-limiting-advanced) ──────────────
  # ai-rate-limiting-advanced counts tokens consumed rather than requests —
  # directly aligned with cost. 500k tokens/hour per route for the PoC.

  - name: ai-rate-limiting-advanced
    route: openai-route
    config:
      llm_providers:
        - name: openai
          limit: 500000
          window_size: 3600

  - name: ai-rate-limiting-advanced
    route: anthropic-route
    config:
      llm_providers:
        - name: anthropic
          limit: 500000
          window_size: 3600

  - name: rate-limiting-advanced
    route: openrouter-route
    config:
      limit:
        - 100
      window_size:
        - 60
      sync_rate: -1

  # ── PII / Content Guard (replaces planned custom filter) ────────────────────
  # ai-prompt-guard blocks requests matching sensitive data patterns before
  # they reach the upstream LLM — no custom middleware needed.

  - name: ai-prompt-guard
    route: openai-route
    config:
      deny_patterns:
        - "\\b\\d{3}-\\d{2}-\\d{4}\\b"          # SSN
        - "\\b\\d{16}\\b"                         # Credit card
        - "(?i)(password|secret|api[_-]?key)\\s*[:=]\\s*\\S+"  # Credentials
      allow_all_conversation_history: true

  - name: ai-prompt-guard
    route: anthropic-route
    config:
      deny_patterns:
        - "\\b\\d{3}-\\d{2}-\\d{4}\\b"
        - "\\b\\d{16}\\b"
        - "(?i)(password|secret|api[_-]?key)\\s*[:=]\\s*\\S+"
      allow_all_conversation_history: true

  - name: ai-prompt-guard
    route: openrouter-route
    config:
      deny_patterns:
        - "\\b\\d{3}-\\d{2}-\\d{4}\\b"
        - "\\b\\d{16}\\b"
        - "(?i)(password|secret|api[_-]?key)\\s*[:=]\\s*\\S+"
      allow_all_conversation_history: true

  # ── Usage Logging → AIRA Backend ────────────────────────────────────────────
  # http-log emits the full Kong request/response log (including ai-proxy's
  # token usage metadata) to the AIRA backend ingestion endpoint after each call.

  - name: http-log
    config:
      http_endpoint: http://aira-backend:8002/ingest/event
      method: POST
      timeout: 5000
      keepalive: 60000
      flush_timeout: 2
      retry_count: 2
