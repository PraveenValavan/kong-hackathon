_format_version: "3.0"
_transform: true

# ─── Services ───────────────────────────────────────────────────────────────

services:
  - name: ai-service
    url: https://api.anthropic.com
    tags: [aira]

# ─── Routes ─────────────────────────────────────────────────────────────────

routes:
  - name: chat-route
    service: ai-service
    paths:
      - /chat
    strip_path: true
    tags: [aira]

# ─── Plugins ────────────────────────────────────────────────────────────────

plugins:
  # ── Auth (global) ────────────────────────────────────────────────────────
  - name: openid-connect
    config:
      issuer: http://mock-oauth2:8080/default/.well-known/openid-configuration
      client_id:
        - aira-local
      client_secret:
        - aira-secret
      auth_methods:
        - bearer
      bearer_token_param_type:
        - header
      verify_signature: true
      issuers_allowed:
        - http://localhost:8080/default
        - http://mock-oauth2:8080/default
      upstream_headers_claims:
        - sub:x-user-id
        - team_id:x-team-id
        - department:x-department

  # ── AI Proxy Advanced ────────────────────────────────────────────────────
  # round-robin with weights: haiku gets 2/3 of traffic (cheaper),
  # sonnet gets 1/3 (more capable). Automatic failover between them.

  - name: ai-proxy-advanced
    route: chat-route
    config:
      balancer:
        algorithm: round-robin

      targets:
        - route_type: llm/v1/chat
          weight: 100
          auth:
            header_name: x-api-key
            header_value: "{vault://env/ANTHROPIC_API_KEY}"
          model:
            provider: anthropic
            name: claude-haiku-4-5-20251001
            options:
              max_tokens: 4096
              temperature: 0.7
              anthropic_version: "2023-06-01"
              input_cost: 0.80    # USD per 1M prompt tokens
              output_cost: 4.00   # USD per 1M completion tokens
          logging:
            log_statistics: true
            log_payloads: false

        - route_type: llm/v1/chat
          weight: 50
          auth:
            header_name: x-api-key
            header_value: "{vault://env/ANTHROPIC_API_KEY}"
          model:
            provider: anthropic
            name: claude-sonnet-4-6
            options:
              max_tokens: 4096
              temperature: 0.7
              anthropic_version: "2023-06-01"
              input_cost: 3.00    # USD per 1M prompt tokens
              output_cost: 15.00  # USD per 1M completion tokens
          logging:
            log_statistics: true
            log_payloads: false

  # ── Token-Based Rate Limiting ────────────────────────────────────────────

  - name: ai-rate-limiting-advanced
    route: chat-route
    config:
      llm_providers:
        - name: anthropic
          limit: 500000
          window_size: 3600

  # ── PII / Content Guard ──────────────────────────────────────────────────

  - name: ai-prompt-guard
    route: chat-route
    config:
      deny_patterns:
        - "\\b\\d{3}-\\d{2}-\\d{4}\\b"                              # SSN
        - "\\b\\d{16}\\b"                                            # Credit card
        - "(?i)(password|secret|api[_-]?key)\\s*[:=]\\s*\\S+"       # Credentials
      allow_all_conversation_history: true

  # ── Pre-function: stash JWT claims into ctx.shared ───────────────────────

  - name: pre-function
    config:
      access:
        - |
          local auth = kong.request.get_header("authorization") or ""
          local token = auth:match("^[Bb]earer%s+(.+)$")
          if token then
            local parts = {}
            for p in token:gmatch("[^%.]+") do parts[#parts+1] = p end
            if parts[2] then
              local b64 = parts[2]:gsub("-", "+"):gsub("_", "/")
              local pad = (4 - #b64 % 4) % 4
              b64 = b64 .. string.rep("=", pad)
              local payload = ngx.decode_base64(b64)
              if payload then
                kong.ctx.shared.aira_user_id    = payload:match('"sub"%s*:%s*"([^"]+)"')
                kong.ctx.shared.aira_team_id    = payload:match('"team_id"%s*:%s*"([^"]+)"')
                kong.ctx.shared.aira_department = payload:match('"department"%s*:%s*"([^"]+)"')
              end
            end
          end
          kong.ctx.shared.session_id = kong.request.get_header("x-session-id")

  # ── File Log — structured NDJSON audit trail ─────────────────────────────

  - name: file-log
    config:
      path: /logs/aira-access.log
      reopen: false
      custom_fields_by_lua:
        user_id:    "return kong.ctx.shared.aira_user_id"
        team_id:    "return kong.ctx.shared.aira_team_id"
        department: "return kong.ctx.shared.aira_department"
        session_id: "return kong.ctx.shared.session_id"

  # ── Usage Logging → AIRA Backend ─────────────────────────────────────────

  - name: http-log
    config:
      http_endpoint: http://aira-backend:8002/ingest/event
      method: POST
      timeout: 5000
      keepalive: 60000
      flush_timeout: 2
      retry_count: 2
      custom_fields_by_lua:
        user_id:    "return kong.ctx.shared.aira_user_id"
        team_id:    "return kong.ctx.shared.aira_team_id"
        department: "return kong.ctx.shared.aira_department"
        session_id: "return kong.ctx.shared.session_id"
