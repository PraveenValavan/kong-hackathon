<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- outer ring -->
  <circle cx="12" cy="12" r="10" stroke="#f0a500" stroke-width="1.5" opacity="0.6"/>
  <!-- inner pulse dot -->
  <circle cx="12" cy="12" r="3.5" fill="#f0a500"/>
  <!-- tick marks at threshold positions -->
  <line x1="12" y1="2"  x2="12" y2="4.5"  stroke="#f0a500" stroke-width="1.5" opacity="0.9"/>
  <line x1="22" y1="12" x2="19.5" y2="12" stroke="#f0a500" stroke-width="1.5" opacity="0.5"/>
  <line x1="12" y1="22" x2="12" y2="19.5" stroke="#f0a500" stroke-width="1.5" opacity="0.3"/>
  <line x1="2"  y1="12" x2="4.5" y2="12"  stroke="#f0a500" stroke-width="1.5" opacity="0.3"/>
  <!-- A I R A lettering hint — two diagonal strokes forming a minimal "A" shape -->
  <path d="M10 15 L12 9 L14 15" stroke="#f0a500" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
  <line x1="10.8" y1="13" x2="13.2" y2="13" stroke="#f0a500" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
</svg>
